<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypted QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #333; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        button:hover { background-color: #0056b3; }
        #qrcode-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
        }
        #generated-link {
            margin-top: 15px;
            word-break: break-all;
            font-size: 0.85rem;
            color: #666;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>QR Code Generator</h2>
        <input type="text" id="doc-name" placeholder="E.g., certificate-naime.pdf" />
        <button onclick="generateEncryptedQR()">Generate Encrypted QR</button>

        <div id="qrcode-container">
            <div id="qrcode"></div>
            <div id="generated-link"></div>
        </div>
    </div>

    <script>
        const SALT = "NH_SECURE_KEY_";

        function generateEncryptedQR() {
            const docName = document.getElementById('doc-name').value.trim();
            if (!docName) {
                alert("Please enter a document name!");
                return;
            }

            const rawText = SALT + docName;
            const encryptedData = btoa(rawText);

            const currentUrl = window.location.href.replace('generator.html', 'index.html');
            const finalLink = `${currentUrl}?key=${encryptedData}`;

            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: finalLink,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            document.getElementById('generated-link').innerHTML = `<strong>Scan Link:</strong><br>${finalLink}`;
        }
    </script>

</body>
</html>
