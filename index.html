<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Document Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100%;
            background-color: #ffffff; /* আপনার স্ক্রিনশটের মতো ক্লিন সাদা ব্যাকগ্রাউন্ড */
        }
        /* কার্ডের চারপাশের প্রফেশনাল থ্রিডি শ্যাডো এবং বর্ডার ও রাউন্ডেড কর্নার */
        .id-card-style {
            width: 100%;
            max-width: 480px; /* মোবাইল স্ক্রিনের জন্য পারফেক্ট সাইজ */
            height: auto;
            border-radius: 24px; /* রাউন্ডেড কর্নার */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12), 0 5px 15px rgba(0, 0, 0, 0.06); /* বামে ও নিচে নিখুঁত শ্যাডো */
            border: 1px solid rgba(0, 0, 0, 0.08);
            display: block;
            transition: transform 0.3s ease;
        }
        .error-card { 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
        }
    </style>
</head>
<body class="flex flex-col items-center justify-start py-8 px-4">

    <div id="card-container" class="hidden w-full flex flex-col items-center gap-8">
        <img id="card-front" class="id-card-style" src="" alt="Card Front">
        
        <img id="card-back" class="id-card-style" src="" alt="Card Back">
    </div>

    <div id="error-card" class="error-card hidden max-w-md w-full bg-white rounded-2xl overflow-hidden border border-gray-100 p-8 text-center my-auto">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 text-red-500 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
            </svg>
        </div>
        <h1 class="text-xl font-bold text-slate-800 mb-2">Verification Failure</h1>
        <p class="text-sm text-gray-500 leading-relaxed">
            No secure file parameter specified or matching identity missing from target path. Verification void.
        </p>
    </div>

    <script>
        const salt1 = "U0VDVVJFX1ZFUklGSUNBVElPTl9TWVNURU1f"; 
        const salt2 = "X09GRklDSUFMX0RPQ1VNRU5UX1ZBTElEX0lEX1ZPSUQ";

        // ডিক্রিপশন ফাংশন
        function decryptData(encryptedText) {
            try {
                if (encryptedText.startsWith(salt1) && encryptedText.endsWith(salt2)) {
                    let cleanToken = encryptedText.replace(salt1, "").replace(salt2, "");
                    return decodeURIComponent(atob(cleanToken));
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        function verifyAndShowCards() {
            const errorEl = document.getElementById('error-card');
            const containerEl = document.getElementById('card-container');
            const frontImg = document.getElementById('card-front');
            const backImg = document.getElementById('card-back');
            
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedToken = urlParams.get('t');

            if (encryptedToken) {
                const fileName = decryptData(encryptedToken);

                if (fileName) {
                    // ২টি ইমেজের পাথ আলাদা আলাদাভাবে জেনারেট করা হচ্ছে
                    const frontPath = `cards/${fileName}_front.jpg`;
                    const backPath = `cards/${fileName}_back.jpg`;

                    // ইমেজ দুটির সোর্স বসানো হচ্ছে
                    frontImg.src = frontPath;
                    backImg.src = backPath;
                    
                    // কন্টেইনার ভিজিবল করা হচ্ছে
                    containerEl.classList.remove('hidden');
                    return; 
                }
            }
            
            // কোনো সমস্যা থাকলে এরর কার্ড আসবে
            errorEl.classList.remove('hidden');
        }

        // ইনস্ট্যান্ট এক্সিকিউশন
        verifyAndShowCards();
    </script>
</body>
</html>
