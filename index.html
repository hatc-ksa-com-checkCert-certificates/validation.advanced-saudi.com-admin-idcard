<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Document Secure Preview</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #0b3954;
            --accent-color: #008080;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            overflow: hidden; /* Desktop/mobile scrolling bound within iframe */
        }

        /* Loading and Error View Wrapper */
        .status-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            box-sizing: border-box;
            padding: 20px;
        }

        .status-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 40px 30px;
            text-align: center;
            border-top: 8px solid var(--primary-color);
        }

        .spinner {
            font-size: 48px;
            color: var(--accent-color);
            margin-bottom: 20px;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-card h2 {
            color: var(--primary-color);
            margin: 10px 0;
            font-size: 20px;
        }

        .status-card p {
            color: #666666;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }

        /* Error UI Specific */
        .error-card {
            border-top-color: #d9534f;
        }
        .error-icon {
            font-size: 48px;
            color: #d9534f;
            margin-bottom: 20px;
        }

        /* Fullscreen Secure PDF Iframe View */
        .preview-container {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            display: none; /* Auto revealed after check */
        }
    </style>
</head>
<body>

    <div id="statusScreen" class="status-wrapper">
        <div id="statusCard" class="status-card">
            <div id="statusIcon" class="spinner"><i class="fa-solid fa-circle-notch"></i></div>
            <h2 id="statusTitle">Verifying Document</h2>
            <p id="statusDesc">Please wait while the system fetches the secure certificate preview...</p>
        </div>
    </div>

    <iframe id="pdfViewer" class="preview-container" src=""></iframe>

<script>
    // CONFIGURATION: Ekhane apnar main GitHub raw repository path-ti secure-vabe diye din
    // Sheshe obosshoi ekta forward slash (/) thakbe.
    const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/naimehasan/my-jmc-portal/main/";

    // URL theke '?file=filename.pdf' parameter reading function
    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    window.onload = function() {
        const targetFile = getUrlParameter('file');
        
        const statusScreen = document.getElementById('statusScreen');
        const statusCard = document.getElementById('statusCard');
        const statusIcon = document.getElementById('statusIcon');
        const statusTitle = document.getElementById('statusTitle');
        const statusDesc = document.getElementById('statusDesc');
        const pdfViewer = document.getElementById('pdfViewer');

        if (targetFile && targetFile.trim() !== "") {
            // Document path combine kora
            const targetPdfUrl = GITHUB_RAW_BASE + targetFile.trim();

            // Mobile o desktop rendering framework logic ensuring no structural overflow
            // Encoded dynamic Google Viewer frame dynamically embedding the target location
            pdfViewer.src = `https://docs.google.com/gview?url=${encodeURIComponent(targetPdfUrl)}&embedded=true`;

            // Frame processing time logic context
            setTimeout(() => {
                statusScreen.style.display = "none"; // Hide standard loading
                pdfViewer.style.display = "block";   // Show fullscreen PDF renderer
            }, 1200);

        } else {
            // URL framework filtering failed handling logic (Token/parameter invalid handle)
            statusCard.classList.add('error-card');
            statusIcon.className = "error-icon";
            statusIcon.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            statusTitle.innerText = "Verification Failure";
            statusDesc.innerText = "No secure file parameter specified or matching identity missing from target path. Verification void.";
        }
    }
</script>

</body>
</html>
