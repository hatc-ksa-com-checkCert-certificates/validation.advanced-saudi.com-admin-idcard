<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Document Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        /* একদম ক্লিন ও বর্ডারলেস ভিউয়ার */
        .clean-viewer {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .error-card { 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="pdf-container" class="w-full h-full hidden">
        <object id="pdf-object" class="clean-viewer" data="" type="application/pdf">
            <iframe id="pdf-iframe" class="clean-viewer" src=""></iframe>
        </object>
    </div>

    <div id="error-card" class="error-card hidden max-w-md w-full bg-white rounded-2xl overflow-hidden border border-gray-100 p-8 text-center m-4">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 text-red-500 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
            </svg>
        </div>
        <h1 class="text-xl font-bold text-slate-800 mb-2">Verification Failure</h1>
        <p class="text-sm text-gray-500 leading-relaxed">
            No secure file parameter specified or matching identity missing from target path. Verification void.
        </p>
    </div>

    <script>
        const salt1 = "U0VDVVJFX1ZFUklGSUNBVElPTl9TWVNURU1f"; 
        const salt2 = "X09GRklDSUFMX0RPQ1VNRU5UX1ZBTElEX0lEX1ZPSUQ";

        // ডিক্রিপশন ফাংশন
        function decryptData(encryptedText) {
            try {
                if (encryptedText.startsWith(salt1) && encryptedText.endsWith(salt2)) {
                    let cleanToken = encryptedText.replace(salt1, "").replace(salt2, "");
                    return decodeURIComponent(atob(cleanToken));
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        function verifyAndRender() {
            const errorEl = document.getElementById('error-card');
            const containerEl = document.getElementById('pdf-container');
            const objectEl = document.getElementById('pdf-object');
            const iframeEl = document.getElementById('pdf-iframe');
            
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedToken = urlParams.get('t');

            if (encryptedToken) {
                const fileName = decryptData(encryptedToken);

                if (fileName) {
                    // ডিরেক্টরি পাথ তৈরি (#toolbar=0 দিলে ব্রাউজারের নিজস্ব মেনুবারও হাইড হয়ে যায়)
                    const filePath = `cards/${fileName}.pdf#toolbar=0&navpanes=0&scrollbar=0`;

                    // অবজেক্ট এবং আইফ্রেম দুটিতেই পাথ সেট করা হলো যেন কোনোভাবেই ফেল না করে
                    objectEl.data = filePath;
                    iframeEl.src = filePath;
                    
                    // ভিউয়ার শো করা হলো
                    containerEl.classList.remove('hidden');
                    return; 
                }
            }
            
            // টোকেন ফেইল করলে এরর দেখাবে
            errorEl.classList.remove('hidden');
        }

        // ইনস্ট্যান্ট এক্সিকিউশন
        verifyAndRender();
    </script>
</body>
</html>
