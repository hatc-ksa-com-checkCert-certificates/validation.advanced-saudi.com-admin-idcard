<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Document Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff;
        }
        /* ইমেজটিকে ফুল স্ক্রিন জুড়ে সুন্দরভাবে ফিট করার জন্য */
        .full-screen-img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* পুরো ফাইলটি স্ক্রিনে পারফেক্টলি ফিট রাখবে */
            display: block;
        }
        .error-card { 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div id="image-container" class="w-full h-full hidden">
        <img id="preview-img" class="full-screen-img" src="" alt="Verified Document">
    </div>

    <div id="error-card" class="error-card hidden max-w-md w-full bg-white rounded-2xl overflow-hidden border border-gray-100 p-8 text-center m-4">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 text-red-500 rounded-full mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-10 h-10">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
            </svg>
        </div>
        <h1 class="text-xl font-bold text-slate-800 mb-2">Verification Failure</h1>
        <p class="text-sm text-gray-500 leading-relaxed">
            No secure file parameter specified or matching identity missing from target path. Verification void.
        </p>
    </div>

    <script>
        const salt1 = "U0VDVVJFX1ZFUklGSUNBVElPTl9TWVNURU1f"; 
        const salt2 = "X09GRklDSUFMX0RPQ1VNRU5UX1ZBTElEX0lEX1ZPSUQ";

        // ডিক্রিপশন ফাংশন
        function decryptData(encryptedText) {
            try {
                if (encryptedText.startsWith(salt1) && encryptedText.endsWith(salt2)) {
                    let cleanToken = encryptedText.replace(salt1, "").replace(salt2, "");
                    return decodeURIComponent(atob(cleanToken));
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        function verifyAndShowImage() {
            const errorEl = document.getElementById('error-card');
            const containerEl = document.getElementById('image-container');
            const imgEl = document.getElementById('preview-img');
            
            const urlParams = new URLSearchParams(window.location.search);
            const encryptedToken = urlParams.get('t');

            if (encryptedToken) {
                const fileName = decryptData(encryptedToken);

                if (fileName) {
                    // এখানে ফাইলের এক্সটেনশন .jpg বা .png ব্যবহার করা হচ্ছে
                    const filePath = `cards/${fileName}.jpg`;

                    // সরাসরি ইমেজের সোর্স সেট করা হলো
                    imgEl.src = filePath;
                    
                    // ভিউয়ার অন করা হলো
                    containerEl.classList.remove('hidden');
                    return; 
                }
            }
            
            // টোকেন ভুল হলে এরর দেখাবে
            errorEl.classList.remove('hidden');
        }

        // ইনস্ট্যান্ট লোড করার জন্য সরাসরি কল
        verifyAndShowImage();
    </script>
</body>
</html>
