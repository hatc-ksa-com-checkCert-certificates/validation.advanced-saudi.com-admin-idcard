<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Document Verification</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #f0f4f8;
        }
        .error-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Loading State -->
    <div id="loading" class="text-center">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
        <p class="mt-4 text-gray-600 font-medium">Verifying document security...</p>
    </div>

    <!-- Error Message Card (Hidden by default) -->
    <div id="error-card" class="error-card hidden max-w-md w-full bg-white rounded-2xl overflow-hidden border border-gray-100">
        <div class="h-2 bg-red-500"></div>
        <div class="p-8 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-red-50 text-red-500 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-10 h-10">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800 mb-2">Verification Failure</h1>
            <p class="text-sm text-gray-500 leading-relaxed">
                No secure file parameter specified or matching identity missing from target path. Verification void.
            </p>
        </div>
    </div>

    <script>
        function verifyAndRedirect() {
            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-card');

            // ১. URL থেকে 't' প্যারামিটার (ফাইলের নাম) নেওয়া
            const urlParams = new URLSearchParams(window.location.search);
            const fileName = urlParams.get('t');

            if (fileName) {
                // ২. cards ফোল্ডারের ভেতরের ফাইলের পাথ তৈরি করা (.pdf এক্সটেনশন সহ)
                const filePath = `cards/${fileName}.pdf`;

                // ৩. ফাইলটি আসলেও cards ফোল্ডারে আপলোড করা হয়েছে কিনা চেক করা
                fetch(filePath, { method: 'HEAD' })
                    .then(response => {
                        if (response.ok) {
                            // ফাইল থাকলে সরাসরি ওপেন হবে
                            window.location.replace(filePath);
                        } else {
                            // ফাইল না থাকলে এরর দেখাবে
                            showError();
                        }
                    })
                    .catch(() => showError());
            } else {
                // ইউআরএল-এ 't' প্যারামিটার না থাকলে এরর দেখাবে
                showError();
            }

            function showError() {
                loadingEl.classList.add('hidden');
                errorEl.classList.remove('hidden');
            }
        }

        // পেজ লোড হলে রান করবে
        window.addEventListener('DOMContentLoaded', verifyAndRedirect);
    </script>
</body>
</html>
